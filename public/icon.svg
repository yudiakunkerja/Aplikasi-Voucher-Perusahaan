<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark slate gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#0c0a09" />
    </linearGradient>
    
    <!-- Premium Golden gradient for emblem -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE082" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#9A7B1C" />
    </linearGradient>

    <!-- Drop Shadow for gold emblem -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Smooth gold accent border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.3" />

  <!-- Main Design Group with Shadow -->
  <g filter="url(#shadow)">
    <!-- Shield/Mineral Outer Shape -->
    <path d="M256,90 L390,160 L390,320 L256,410 L122,320 L122,160 Z" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Inner stylized golden Document / Card shape -->
    <rect x="186" y="180" width="140" height="152" rx="16" fill="url(#goldGrad)" />
    
    <!-- Horizontal document item lines in the document -->
    <line x1="210" y1="215" x2="302" y2="215" stroke="#1c1917" stroke-width="8" stroke-linecap="round" />
    <line x1="210" y1="245" x2="302" y2="245" stroke="#1c1917" stroke-width="8" stroke-linecap="round" />
    <line x1="210" y1="275" x2="270" y2="275" stroke="#1c1917" stroke-width="8" stroke-linecap="round" />
    
    <!-- Stylized Checkmark signifying Approved/Processed -->
    <circle cx="304" cy="304" r="22" fill="#1c1917" />
    <path d="M294,304 L300,310 L314,296" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Corporate Monogram NMSA Text -->
  <text x="256" y="456" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="28" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">NMSA PORTAL</text>
</svg>
