<!DOCTYPE html>
<html>
<head>
<style>
  .parent {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 300px;
    background: lightblue;
  }
  .child {
    position: absolute;
    width: 300px;
    height: 200px;
    background: rgba(255,0,0,0.5);
  }
</style>
</head>
<body>
<div class="parent">
  <div class="child"></div>
</div>
</body>
</html>
